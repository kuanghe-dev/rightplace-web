<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design 3 — Soft / Playful</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #FEF3C7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 32px;
  }

  .game-title {
    font-family: sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #78350F;
    letter-spacing: -0.5px;
  }

  .position-numbers {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .position-numbers span {
    width: 100px;
    text-align: center;
    font-family: sans-serif;
    font-size: 13px;
    color: #B45309;
    font-weight: 500;
  }

  .cards {
    display: flex;
    gap: 16px;
  }

  .card {
    width: 100px;
    height: 140px;
    background: #FFFBEB;
    border: 2px solid #FDE68A;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    font-weight: 700;
    color: #78350F;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(180,83,9,0.12);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    user-select: none;
  }

  .card.selected {
    border-color: #F59E0B;
    border-width: 3px;
    background: #FFF8E1;
    transform: translateY(-10px);
    box-shadow: 0 12px 28px rgba(245,158,11,0.3);
  }

  .score-row {
    font-family: sans-serif;
    font-size: 16px;
    color: #92400E;
  }

  .score-row strong {
    color: #78350F;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: sans-serif;
  }

  .swap-count {
    font-size: 14px;
    color: #B45309;
  }

  .btn-swap {
    background: #F59E0B;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 10px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    box-shadow: 0 3px 8px rgba(245,158,11,0.3);
  }

  .btn-swap:disabled {
    background: #FDE68A;
    color: #B45309;
    box-shadow: none;
    cursor: not-allowed;
  }

  .btn-swap:not(:disabled):hover {
    background: #D97706;
  }
</style>
</head>
<body>

<p class="game-title">RightPlace</p>
<p style="font-family:sans-serif;font-size:13px;color:#B45309;">Design 3 — Soft / Playful</p>

<div class="position-numbers">
  <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
</div>

<div class="cards">
  <div class="card">C</div>
  <div class="card selected">A</div>
  <div class="card">E</div>
  <div class="card selected">D</div>
  <div class="card">B</div>
</div>

<div class="score-row">Correct: <strong>1</strong> of 5</div>

<div class="controls">
  <span class="swap-count">Swaps: 3</span>
  <button class="btn-swap">Swap</button>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design 1 — Classic</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #F3F4F6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 32px;
  }

  h1 {
    font-family: sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6B7280;
  }

  .game-title {
    font-family: sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #111827;
    letter-spacing: -0.5px;
  }

  .position-numbers {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .position-numbers span {
    width: 100px;
    text-align: center;
    font-family: sans-serif;
    font-size: 13px;
    color: #9CA3AF;
    font-weight: 500;
  }

  .cards {
    display: flex;
    gap: 16px;
  }

  .card {
    width: 100px;
    height: 140px;
    background: white;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    font-weight: 700;
    color: #111827;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    user-select: none;
  }

  .card.selected {
    border-color: #3B82F6;
    border-width: 3px;
    transform: translateY(-10px);
    box-shadow: 0 12px 24px rgba(59,130,246,0.25);
  }

  .score-row {
    font-family: sans-serif;
    font-size: 16px;
    color: #374151;
  }

  .score-row strong {
    color: #111827;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: sans-serif;
  }

  .swap-count {
    font-size: 14px;
    color: #6B7280;
  }

  .btn-swap {
    background: #3B82F6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-swap:disabled {
    background: #D1D5DB;
    color: #9CA3AF;
    cursor: not-allowed;
  }

  .btn-swap:not(:disabled):hover {
    background: #2563EB;
  }
</style>
</head>
<body>

<p class="game-title">RightPlace</p>
<p style="font-family:sans-serif;font-size:13px;color:#9CA3AF;">Design 1 — Classic</p>

<div class="position-numbers">
  <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
</div>

<div class="cards">
  <div class="card">C</div>
  <div class="card selected">A</div>
  <div class="card">E</div>
  <div class="card selected">D</div>
  <div class="card">B</div>
</div>

<div class="score-row">Correct: <strong>1</strong> of 5</div>

<div class="controls">
  <span class="swap-count">Swaps: 3</span>
  <button class="btn-swap">Swap</button>
</div>

</body>
</html>
